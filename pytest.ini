[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Pruebas unitarias (sin I/O)
    integration: Pruebas de integración (SQLite en archivo temporal)
    e2e: Pruebas end-to-end (Playwright)
