# .github/workflows/ci.yml
# CI/CD para LevelUp-ELO — 5 jobs
# Disparadores: push a main, pull_request hacia main

name: LevelUp-ELO CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Validar banco de preguntas ────────────────────────────────
  validate-bank:
    name: "Banco de preguntas"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Ejecutar validador del banco
        run: python scripts/validate_bank.py

  # ── Job 2: Linting y formateo ─────────────────────────────────────────
  lint:
    name: "Lint & formato"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar herramientas de lint
        run: pip install black==24.3.0 flake8==7.0.0

      - name: Black (solo verificar, no modificar)
        run: black --check --line-length=100 src/ tests/ scripts/

      - name: Flake8 (errores críticos solamente)
        run: |
          flake8 src/ tests/ scripts/ \
            --max-line-length=100 \
            --select=E9,F63,F7,F82 \
            --count

  # ── Job 3: Tests unitarios ────────────────────────────────────────────
  test-unit:
    name: "Tests unitarios"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Ejecutar tests unitarios con cobertura
        run: |
          python -m pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=src/domain \
            --cov=src/application \
            --cov-report=term-missing \
            --cov-fail-under=70
        env:
          TESTING: "1"

      - name: Subir reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: .coverage

  # ── Job 4: Tests de integración ───────────────────────────────────────
  test-integration:
    name: "Tests de integración"
    runs-on: ubuntu-latest
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt pytest

      - name: Ejecutar tests de integración (SQLite en archivo temporal)
        run: |
          python -m pytest tests/integration/ \
            -v \
            --tb=short
        env:
          TESTING: "1"

  # ── Job 5: Paridad SQLite/PostgreSQL ─────────────────────────────────
  db-sync:
    name: "Paridad DB"
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar paridad SQLite/PostgreSQL
        run: python scripts/db_sync_check.py
